<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheer | Animated Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
 background:#000;
 color:#fff;
 overflow-x:hidden;
}

/* CURSOR */
.cursor{
 width:20px;
 height:20px;
 border:2px solid #58a6ff;
 border-radius:50%;
 position:fixed;
 pointer-events:none;
 transform:translate(-50%,-50%);
}

/* HERO */
.hero{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

.hero h1{
 font-size:80px;
}

.gradient{
 background:linear-gradient(90deg,#00f2fe,#4facfe);
 -webkit-background-clip:text;
 color:transparent;
}

/* SECTION */
section{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:40px;
}

/* PARALLAX */
.parallax{
 background:url('https://picsum.photos/1920/1080') center/cover;
}

/* BOX */
.box{
 width:200px;
 height:200px;
 background:#111;
 display:flex;
 justify-content:center;
 align-items:center;
 border-radius:20px;
}

</style>
</head>

<body>

<div class="cursor"></div>

<section class="hero">
 <h1>Hello I'm <span class="gradient">Sudheer</span></h1>
</section>

<section class="parallax">Scroll Down</section>

<section>
 <div class="box">Animated Box</div>
</section>

<section>End</section>

<script>

/* CURSOR */
document.addEventListener("mousemove",e=>{
 document.querySelector(".cursor").style.top=e.clientY+"px";
 document.querySelector(".cursor").style.left=e.clientX+"px";
});

/* GSAP HERO */
gsap.from(".hero h1",{y:100,opacity:0,duration:1});

/* SCROLL ANIMATIONS */
gsap.to(".parallax",{
 backgroundPosition:"50% 100%",
 ease:"none",
 scrollTrigger:{
  trigger:".parallax",
  scrub:true
 }
});

/* BOX ANIMATION */
gsap.from(".box",{
 scrollTrigger:{
  trigger:".box",
  start:"top 80%"
 },
 y:200,
 opacity:0,
 duration:1
});

/* TEXT REVEAL */
gsap.utils.toArray("section").forEach(sec=>{
 gsap.from(sec,{
  scrollTrigger:sec,
  opacity:0,
  y:50,
  duration:1
 });
});

</script>

</body>
</html>
