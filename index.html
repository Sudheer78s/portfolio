<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheer | Apple Style Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:20px 10%;
  display:flex;
  justify-content:space-between;
  backdrop-filter:blur(20px);
}

.logo{
  font-size:24px;
  font-weight:800;
  color:#fff;
}

section{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* HERO */
.hero h1{
  font-size:80px;
  text-align:center;
}

.gradient{
  background:linear-gradient(90deg,#00f2fe,#4facfe);
  -webkit-background-clip:text;
  color:transparent;
}

/* 3D CARD */
.card{
  width:300px;
  height:200px;
  background:#111;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:20px;
  transition:0.3s;
  transform-style:preserve-3d;
}

.card:hover{
  transform:rotateY(15deg) rotateX(10deg);
}

/* CHATBOT */
.chatbot{
  position:fixed;
  bottom:20px;
  right:20px;
  width:300px;
  background:#111;
  border-radius:15px;
  padding:10px;
}

.chatbot input{
  width:100%;
  padding:10px;
  border:none;
  background:#222;
  color:#fff;
}

.chatbox{
  height:150px;
  overflow:auto;
  font-size:14px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Sudheer</div>
</nav>

<section class="hero">
  <h1>Hello, I'm <span class="gradient">Sudheer</span></h1>
</section>

<section>
  <h2>Projects</h2>
  <div class="card">Project 1</div>
  <div class="card">Project 2</div>
</section>

<!-- CHATBOT -->
<div class="chatbot">
  <div class="chatbox" id="chatbox"></div>
  <input type="text" id="input" placeholder="Ask me...">
</div>

<script>

/* GSAP ANIMATION */
gsap.from(".hero h1",{y:100,opacity:0,duration:1});

/* PARALLAX */
window.addEventListener("scroll",()=>{
  document.querySelector(".hero h1").style.transform =
  "translateY("+window.scrollY*0.5+"px)";
});

/* AI CHATBOT */
const input=document.getElementById("input");
const chatbox=document.getElementById("chatbox");

input.addEventListener("keypress",function(e){
 if(e.key==="Enter"){
  let user=input.value;
  chatbox.innerHTML+="<div>🧑 "+user+"</div>";

  let reply="I am Sudheer's AI 🤖";

  if(user.includes("name")) reply="My name is Sudheer";
  if(user.includes("skills")) reply="HTML CSS JS DSA";

  chatbox.innerHTML+="<div>🤖 "+reply+"</div>";
  input.value="";
 }
});

</script>

</body>
</html>
