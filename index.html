<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheer | PRO MAX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
  transition:0.3s;
}

/* DARK LIGHT */
.light{
  background:#fff;
  color:#000;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:20px;
  display:flex;
  justify-content:space-between;
  backdrop-filter:blur(20px);
  z-index:1000;
}

button{
  padding:10px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

h1{
  font-size:80px;
}

.gradient{
  background:linear-gradient(90deg,#00f2fe,#4facfe);
  -webkit-background-clip:text;
  color:transparent;
}

/* PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* CHATBOT */
.chatbot{
  position:fixed;
  bottom:20px;
  right:20px;
  width:280px;
  background:#111;
  padding:10px;
  border-radius:10px;
}
.chatbox{height:120px;overflow:auto;}
input{width:100%;padding:8px;margin-top:5px;}

</style>
</head>

<body>

<nav>
  <div>Sudheer</div>
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="playMusic()">🎵</button>
  </div>
</nav>

<canvas id="bg"></canvas>

<section class="hero">
  <h1>Hello I'm <span class="gradient">Sudheer</span></h1>
</section>

<!-- CHATBOT -->
<div class="chatbot">
  <div class="chatbox" id="chatbox"></div>
  <input id="input" placeholder="Ask me...">
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>

/* THEME */
function toggleTheme(){
 document.body.classList.toggle("light");
}

/* MUSIC */
function playMusic(){
 document.getElementById("music").play();
}

/* GSAP */
gsap.from("h1",{y:100,opacity:0,duration:1});

/* PARTICLES */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
 particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:1,vy:1});
}

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 particles.forEach(p=>{
   p.x+=p.vx;
   p.y+=p.vy;
   ctx.fillRect(p.x,p.y,2,2);
 });
 requestAnimationFrame(animate);
}
animate();

/* THREE JS 3D */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry=new THREE.BoxGeometry();
const material=new THREE.MeshBasicMaterial({color:0x00ffff,wireframe:true});
const cube=new THREE.Mesh(geometry,material);
scene.add(cube);

camera.position.z=5;

function render3D(){
 cube.rotation.x+=0.01;
 cube.rotation.y+=0.01;
 renderer.render(scene,camera);
 requestAnimationFrame(render3D);
}
render3D();

/* CHATBOT */
const input=document.getElementById("input");
const chatbox=document.getElementById("chatbox");

input.addEventListener("keypress",function(e){
 if(e.key==="Enter"){
  let msg=input.value;
  chatbox.innerHTML+="<div>🧑 "+msg+"</div>";

  let reply="I am Sudheer AI 🤖";
  if(msg.includes("name")) reply="Sudheer Sharma";
  if(msg.includes("skills")) reply="HTML CSS JS DSA";

  chatbox.innerHTML+="<div>🤖 "+reply+"</div>";
  input.value="";
 }
});

</script>

</body>
</html>
